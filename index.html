
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body id="body">
  <div class="container">
    <h1>맞춤형 화장품 추천</h1>
    <p>피부 고민을 입력해 주시면 최적의 제품 3종을 추천해 드립니다.</p>
    
    <div class="input-section">
      <textarea id="concern-input" placeholder="예: 피부가 건조하고 당겨요 / 여드름이 고민이에요"></textarea>
      <button id="recommend-btn">추천 받기</button>
    </div>

    <div id="recommendations" class="recommendations-container">
      <!-- 추천 결과가 여기에 표시됩니다. -->
    </div>

    <div class="partnership-section">
      <hr>
      <h2>제휴 문의</h2>
      <p>비즈니스 협업 및 제휴 제안을 기다립니다.</p>
      <form action="https://formspree.io/f/xkoqenze" method="POST" class="partnership-form">
        <div class="form-group">
          <label for="company">회사명 / 성함</label>
          <input type="text" id="company" name="company" placeholder="회사명 또는 성함을 입력해주세요" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="답변받으실 이메일을 입력해주세요" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="제휴 제안 내용을 상세히 입력해주세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
